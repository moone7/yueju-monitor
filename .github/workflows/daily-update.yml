name: Daily Auto Update

on:
  schedule:
    # UTC 01:00 & 13:00 = 北京时间 09:00 & 21:00
    - cron: '0 1,13 * * *'
  workflow_dispatch: {}  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests lxml
      
      - name: Scrape data sources
        run: python scraper.py
      
      - name: Generate index.html
        run: python generate.py
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html shows.json
          if [ -d shows_history ]; then git add shows_history/; fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily auto-update $(date -u +%Y-%m-%d)"
            git push
          fi
      
      - name: Check for new shows
        run: |
          if grep -q "new-" shows.json; then
            echo "::warning::发现新演出场次，请手动检查 shows.json 并补全信息"
          fi

      - name: 🔔 推送新演出通知（Server酱）
        if: success()
        env:
          SCKEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          if [ -n "$SCKEY" ] && [ -f new_shows.json ]; then
            COUNT=$(python -c "import json;print(len(json.load(open('new_shows.json'))))")
            if [ "$COUNT" -gt 0 ]; then
              TITLE="🎭 越剧新开演 ×$COUNT"
              DESP=$(python -c "
          import json
          d = json.load(open('new_shows.json'))
          lines = []
          for s in d:
              lines.append('• ' + s.get('date','') + ' ' + s.get('title','') + ' @ ' + s.get('venue',''))
          print(chr(10).join(lines))
          ")
              curl -s -G "https://sctapi.ftqq.com/${SCKEY}.send" \
                --data-urlencode "title=${TITLE}" \
                --data-urlencode "desp=${DESP}"
              echo "已推送通知：$COUNT 场新演出"
            else
              echo "无新增，跳过通知"
            fi
          else
            echo "未配置 SERVERCHAN_KEY 或无 new_shows.json，跳过通知"
          fi

